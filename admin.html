<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0d0f1a]">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISSACC | Admin Control Console</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Remix Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <!-- Cropper.js (For profile photo cropping) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              purple: '#5c1392',
              pink: '#bd32b1',
              dark: '#0d0f1a',
              card: '#16192b',
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0d0f1a;
    }
    ::-webkit-scrollbar-thumb {
      background: #272c47;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #bd32b1;
    }
    
    .active-nav {
      background: linear-gradient(135deg, rgba(92, 19, 146, 0.4), rgba(189, 50, 177, 0.4));
      border-left: 4px solid #bd32b1;
      color: #ffffff !important;
    }

    /* Cropper circle style - only when .cropper-circle is on the modal */
    .cropper-circle .cropper-view-box,
    .cropper-circle .cropper-face {
      border-radius: 50%;
    }

    /* Hide scrollbars globally while preserving scroll */
    * {
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE / Edge */
    }
    *::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }
  </style>
</head>

<body class="h-full font-sans text-gray-100 flex flex-col overflow-hidden bg-[#07080f]">

  <!-- ==================== LOGIN VIEW ==================== -->
  <div id="login-container" class="fixed inset-0 z-50 flex items-center justify-center bg-[#07080f] px-6">
    <div class="absolute w-[400px] h-[400px] bg-brand-purple/20 rounded-full blur-[120px] top-1/4 left-1/4 animate-pulse"></div>
    <div class="absolute w-[350px] h-[350px] bg-brand-pink/20 rounded-full blur-[100px] bottom-1/4 right-1/4"></div>

    <div class="w-full max-w-md bg-brand-card/60 backdrop-blur-xl border border-white/5 rounded-3xl p-8 md:p-10 shadow-2xl relative z-10">
      <div class="flex flex-col items-center mb-8">
        <span class="font-outfit font-black text-4xl text-transparent bg-clip-text bg-gradient-to-r from-brand-pink to-purple-400 tracking-tight mb-2">ISSACC</span>
        <h2 class="text-sm font-semibold uppercase tracking-[0.2em] text-gray-400">ADMIN CONTROL</h2>
      </div>

      <form id="login-form" class="space-y-6">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Email Address</label>
          <div class="relative">
            <i class="ri-mail-line absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
            <input type="email" id="login-email" required
              class="w-full pl-12 pr-4 py-3.5 bg-brand-dark/80 border border-white/10 rounded-2xl focus:outline-none focus:border-brand-pink text-white transition-colors"
              placeholder="admin@issacc.com">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Password</label>
          <div class="relative">
            <i class="ri-lock-line absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
            <input type="password" id="login-password" required
              class="w-full pl-12 pr-4 py-3.5 bg-brand-dark/80 border border-white/10 rounded-2xl focus:outline-none focus:border-brand-pink text-white transition-colors"
              placeholder="••••••••">
          </div>
        </div>

        <button type="submit" id="login-btn"
          class="w-full py-4 rounded-2xl text-white font-bold text-base bg-gradient-to-r from-brand-purple to-brand-pink shadow-lg shadow-brand-pink/20 hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
          <span>Sign In</span>
          <i class="ri-arrow-right-line"></i>
        </button>
      </form>
    </div>
  </div>

  <!-- ==================== MAIN DASHBOARD VIEW ==================== -->
  <div id="dashboard-container" class="hidden h-full flex flex-col md:flex-row relative">

    <!-- Sidebar Navigation -->
    <aside class="w-full md:w-64 bg-brand-card/30 border-b md:border-b-0 md:border-r border-white/5 flex flex-col h-auto md:h-full z-10 shrink-0">
      <div class="px-6 py-8 flex items-center gap-3 border-b border-white/5 shrink-0">
        <span class="font-outfit font-black text-2xl text-transparent bg-clip-text bg-gradient-to-r from-brand-pink to-purple-400">ISSACC</span>
        <span class="text-[9px] px-2 py-0.5 rounded-full border border-white/10 text-gray-400 font-bold uppercase tracking-wider">Console</span>
      </div>

      <nav id="sidebar-nav" class="flex-grow px-4 py-6 space-y-2 flex flex-row md:flex-col overflow-x-auto md:overflow-x-visible">
        <button onclick="switchTab('events')" class="active-nav w-full py-3.5 px-4 rounded-2xl text-gray-400 hover:text-white transition-all flex items-center gap-3.5 text-[15px] font-semibold tracking-wide shrink-0">
          <i class="ri-calendar-event-line text-lg"></i>
          <span>Events</span>
        </button>
        <button onclick="switchTab('team')" class="w-full py-3.5 px-4 rounded-2xl text-gray-400 hover:text-white transition-all flex items-center gap-3.5 text-[15px] font-semibold tracking-wide shrink-0">
          <i class="ri-user-star-line text-lg"></i>
          <span>Team</span>
        </button>
        <button onclick="switchTab('gallery')" class="w-full py-3.5 px-4 rounded-2xl text-gray-400 hover:text-white transition-all flex items-center gap-3.5 text-[15px] font-semibold tracking-wide shrink-0">
          <i class="ri-image-line text-lg"></i>
          <span>Gallery</span>
        </button>
        <button onclick="switchTab('achievements')" class="w-full py-3.5 px-4 rounded-2xl text-gray-400 hover:text-white transition-all flex items-center gap-3.5 text-[15px] font-semibold tracking-wide shrink-0">
          <i class="ri-trophy-line text-lg"></i>
          <span>Achievements</span>
        </button>
        <button onclick="switchTab('clubs')" class="w-full py-3.5 px-4 rounded-2xl text-gray-400 hover:text-white transition-all flex items-center gap-3.5 text-[15px] font-semibold tracking-wide shrink-0">
          <i class="ri-shield-user-line text-lg"></i>
          <span>Clubs</span>
        </button>
        <button onclick="switchTab('settings')" class="w-full py-3.5 px-4 rounded-2xl text-gray-400 hover:text-white transition-all flex items-center gap-3.5 text-[15px] font-semibold tracking-wide shrink-0">
          <i class="ri-settings-4-line text-lg"></i>
          <span>Settings</span>
        </button>
      </nav>

      <div class="p-4 border-t border-white/5 shrink-0">
        <button id="logout-btn"
          class="w-full py-3 px-4 rounded-2xl text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-all flex items-center justify-center gap-2.5 text-sm font-bold">
          <i class="ri-logout-box-r-line"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Content Workspace -->
    <main class="flex-grow flex flex-col h-full overflow-hidden bg-brand-dark/20 relative">
      <header class="h-20 border-b border-white/5 flex items-center justify-between px-6 md:px-8 shrink-0">
        <h1 id="tab-title" class="font-outfit font-black text-2xl tracking-tight text-white capitalize">Events</h1>
        <button id="add-new-btn" onclick="openFormModal()"
          class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-brand-purple to-brand-pink text-white font-bold text-sm shadow-md shadow-brand-pink/10 hover:opacity-90 active:scale-95 transition-all flex items-center gap-2">
          <i class="ri-add-line text-lg -ml-1"></i> Add New
        </button>
      </header>

      <!-- Dynamic Data List Grid -->
      <div id="data-container" class="flex-grow overflow-y-auto p-6 md:p-8">
        <div id="data-loader" class="flex items-center justify-center h-full">
          <div class="w-10 h-10 border-4 border-brand-pink border-t-transparent rounded-full animate-spin"></div>
        </div>
        
        <div id="data-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
        
        <!-- Settings Form View Container -->
        <div id="settings-view" class="max-w-4xl mx-auto bg-brand-card/40 border border-white/5 rounded-3xl p-6 md:p-8 hidden">
          <form id="settings-form" class="space-y-8">
            <!-- About Section Fields -->
            <div>
              <h3 class="text-lg font-bold text-white border-b border-white/5 pb-3 mb-5 flex items-center gap-2">
                <i class="ri-information-line text-brand-pink"></i> About Section Settings
              </h3>
              <div class="space-y-5">
                <div>
                  <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Main Headline</label>
                  <textarea id="set-about-main" required rows="2" class="w-full px-4 py-3 bg-brand-dark/80 border border-white/10 rounded-xl focus:outline-none focus:border-brand-pink text-white"></textarea>
                </div>
                <div>
                  <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Sub-text / Description</label>
                  <textarea id="set-about-sub" required rows="3" class="w-full px-4 py-3 bg-brand-dark/80 border border-white/10 rounded-xl focus:outline-none focus:border-brand-pink text-white"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Image (Before Click)</label>
                    <div id="about-img-before-zone" class="border border-white/10 hover:border-brand-pink/50 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer transition-colors relative min-h-[120px]">
                      <i class="ri-image-add-line text-2xl text-gray-500 mb-1"></i>
                      <span class="text-xs text-gray-400">Change image</span>
                      <div id="about-img-before-preview" class="absolute inset-0 rounded-xl overflow-hidden bg-brand-card hidden pointer-events-none">
                        <img src="" class="w-full h-full object-cover">
                      </div>
                      <input type="file" id="about-img-before" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                    </div>
                  </div>
                  <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Image (After Click)</label>
                    <div id="about-img-after-zone" class="border border-white/10 hover:border-brand-pink/50 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer transition-colors relative min-h-[120px]">
                      <i class="ri-image-add-line text-2xl text-gray-500 mb-1"></i>
                      <span class="text-xs text-gray-400">Change image</span>
                      <div id="about-img-after-preview" class="absolute inset-0 rounded-xl overflow-hidden bg-brand-card hidden pointer-events-none">
                        <img src="" class="w-full h-full object-cover">
                      </div>
                      <input type="file" id="about-img-after" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Footer Section Fields -->
            <div>
              <h3 class="text-lg font-bold text-white border-b border-white/5 pb-3 mb-5 flex items-center gap-2">
                <i class="ri-links-line text-brand-pink"></i> Footer & Social Links
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                  <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Contact Email</label>
                  <input type="email" id="set-email" placeholder="issacc@ietlucknow.ac.in" class="w-full px-4 py-3 bg-brand-dark/80 border border-white/10 rounded-xl focus:outline-none focus:border-brand-pink text-white">
                </div>

                <!-- Instagram -->
                <div>
                  <div class="flex items-center justify-between mb-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400 flex items-center gap-1.5">
                      <i class="ri-instagram-line text-pink-400"></i> Instagram
                    </label>
                    <label class="relative inline-flex items-center cursor-pointer" title="Enable/Disable Instagram in footer">
                      <input type="checkbox" id="toggle-instagram" class="sr-only peer" checked onchange="toggleSocialInput('instagram')">
                      <div class="w-8 h-4 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-brand-pink"></div>
                    </label>
                  </div>
                  <input type="url" id="set-instagram" placeholder="https://www.instagram.com/..." class="w-full px-4 py-3 bg-brand-dark/80 border border-white/10 rounded-xl focus:outline-none focus:border-brand-pink text-white transition-opacity">
                </div>

                <!-- Facebook -->
                <div>
                  <div class="flex items-center justify-between mb-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400 flex items-center gap-1.5">
                      <i class="ri-facebook-fill text-blue-400"></i> Facebook
                    </label>
                    <label class="relative inline-flex items-center cursor-pointer" title="Enable/Disable Facebook in footer">
                      <input type="checkbox" id="toggle-facebook" class="sr-only peer" checked onchange="toggleSocialInput('facebook')">
                      <div class="w-8 h-4 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-brand-pink"></div>
                    </label>
                  </div>
                  <input type="url" id="set-facebook" placeholder="https://www.facebook.com/..." class="w-full px-4 py-3 bg-brand-dark/80 border border-white/10 rounded-xl focus:outline-none focus:border-brand-pink text-white transition-opacity">
                </div>

                <!-- LinkedIn -->
                <div>
                  <div class="flex items-center justify-between mb-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400 flex items-center gap-1.5">
                      <i class="ri-linkedin-box-fill text-blue-500"></i> LinkedIn
                    </label>
                    <label class="relative inline-flex items-center cursor-pointer" title="Enable/Disable LinkedIn in footer">
                      <input type="checkbox" id="toggle-linkedin" class="sr-only peer" checked onchange="toggleSocialInput('linkedin')">
                      <div class="w-8 h-4 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-brand-pink"></div>
                    </label>
                  </div>
                  <input type="url" id="set-linkedin" placeholder="https://www.linkedin.com/..." class="w-full px-4 py-3 bg-brand-dark/80 border border-white/10 rounded-xl focus:outline-none focus:border-brand-pink text-white transition-opacity">
                </div>

                <!-- YouTube -->
                <div>
                  <div class="flex items-center justify-between mb-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400 flex items-center gap-1.5">
                      <i class="ri-youtube-fill text-red-500"></i> YouTube
                    </label>
                    <label class="relative inline-flex items-center cursor-pointer" title="Enable/Disable YouTube in footer">
                      <input type="checkbox" id="toggle-youtube" class="sr-only peer" checked onchange="toggleSocialInput('youtube')">
                      <div class="w-8 h-4 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-brand-pink"></div>
                    </label>
                  </div>
                  <input type="url" id="set-youtube" placeholder="https://www.youtube.com/..." class="w-full px-4 py-3 bg-brand-dark/80 border border-white/10 rounded-xl focus:outline-none focus:border-brand-pink text-white transition-opacity">
                </div>

                <!-- X (Twitter) -->
                <div>
                  <div class="flex items-center justify-between mb-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400 flex items-center gap-1.5">
                      <i class="ri-twitter-x-fill text-gray-300"></i> X (Twitter)
                    </label>
                    <label class="relative inline-flex items-center cursor-pointer" title="Enable/Disable X (Twitter) in footer">
                      <input type="checkbox" id="toggle-twitter" class="sr-only peer" checked onchange="toggleSocialInput('twitter')">
                      <div class="w-8 h-4 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-brand-pink"></div>
                    </label>
                  </div>
                  <input type="url" id="set-twitter" placeholder="https://x.com/..." class="w-full px-4 py-3 bg-brand-dark/80 border border-white/10 rounded-xl focus:outline-none focus:border-brand-pink text-white transition-opacity">
                </div>
              </div>
            </div>

            <!-- Submit Settings Button -->
            <div class="flex justify-end pt-5 border-t border-white/5">
              <button type="submit" id="save-settings-btn" class="px-6 py-3.5 bg-gradient-to-r from-brand-purple to-brand-pink rounded-xl text-white font-bold hover:opacity-90 active:scale-95 transition-all flex items-center gap-2">
                <i class="ri-save-line"></i> Save All Settings
              </button>
            </div>
          </form>
        </div>

        <div id="data-empty" class="hidden flex-col items-center justify-center h-full text-center">
          <i class="ri-folder-open-line text-5xl text-gray-500 mb-4"></i>
          <p class="text-gray-400 font-medium">No items found. Create one now!</p>
        </div>
      </div>
    </main>

  </div>

  <!-- ==================== FORM MODAL (ADD / EDIT) ==================== -->
  <div id="form-modal" class="fixed inset-0 z-50 hidden bg-[#07080f]/80 backdrop-blur-sm items-center justify-center p-6">
    <div class="w-full max-w-2xl bg-brand-card border border-white/10 rounded-3xl p-6 md:p-8 max-h-[90vh] overflow-y-auto shadow-2xl relative">
      <button onclick="closeFormModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white transition-colors">
        <i class="ri-close-line text-2xl"></i>
      </button>

      <h3 id="form-title" class="font-outfit font-black text-xl text-white mb-6">Create New</h3>

      <form id="dashboard-form" class="space-y-6">
        <input type="hidden" id="entry-id">
        
        <div id="form-fields" class="space-y-5"></div>

        <div class="flex items-center justify-end gap-4 border-t border-white/5 pt-6 mt-8">
          <button type="button" onclick="closeFormModal()"
            class="px-5 py-3 rounded-xl border border-white/10 text-gray-400 hover:bg-white/5 hover:text-white transition-all text-sm font-semibold">
            Cancel
          </button>
          <button type="submit" id="submit-btn"
            class="px-6 py-3 rounded-xl bg-gradient-to-r from-brand-purple to-brand-pink text-white font-bold text-sm hover:opacity-90 active:scale-95 transition-all flex items-center gap-2">
            <span>Publish</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ==================== IMAGE CROPPER MODAL ==================== -->
  <div id="cropper-modal" class="fixed inset-0 z-[60] hidden bg-black/90 items-center justify-center p-6">
    <div class="w-full max-w-xl bg-brand-card border border-white/10 rounded-3xl p-6 flex flex-col max-h-[90vh]">
      <h4 id="cropper-modal-title" class="font-outfit font-black text-lg text-white mb-4">Crop Profile Image</h4>
      <div class="flex-grow overflow-hidden bg-black/50 rounded-2xl relative min-h-[300px] flex items-center justify-center">
        <img id="cropper-image" class="max-w-full max-h-[50vh] block">
      </div>
      <div class="flex items-center justify-end gap-4 mt-6">
        <button type="button" onclick="closeCropper()" class="px-4 py-2 border border-white/10 text-gray-400 rounded-xl hover:text-white transition-colors text-sm font-semibold">Cancel</button>
        <button type="button" onclick="applyCrop()" class="px-5 py-2.5 bg-brand-pink text-white rounded-xl hover:opacity-90 transition-colors text-sm font-bold">Apply Crop</button>
      </div>
    </div>
  </div>

    function handleAuthState(session) {
      currentSession = session;
      const login = document.getElementById('login-container');
      const dashboard = document.getElementById('dashboard-container');

      if (session) {
        login.classList.add('hidden');
        dashboard.classList.remove('hidden');
        switchTab(currentTab);
      } else {
        login.classList.remove('hidden');
        dashboard.classList.add('hidden');
      }
    }

    function switchTab(tabName) {
      currentTab = tabName;
      
      document.querySelectorAll('#sidebar-nav button').forEach(btn => btn.classList.remove('active-nav'));
      const tabsList = ['events', 'team', 'gallery', 'achievements', 'clubs', 'settings'];
      const activeBtnIndex = tabsList.indexOf(tabName);
      document.querySelectorAll('#sidebar-nav button')[activeBtnIndex].classList.add('active-nav');

      document.getElementById('tab-title').innerText = tabName === 'events' ? 'Events' : tabName;

      // Hide or show add-new button based on settings tab
      const addNewBtn = document.getElementById('add-new-btn');
      const settingsView = document.getElementById('settings-view');
      const grid = document.getElementById('data-grid');

      if (tabName === 'settings') {
        addNewBtn.classList.add('hidden');
        grid.classList.add('hidden');
        settingsView.classList.remove('hidden');
        loadSettingsData();
      } else {
        addNewBtn.classList.remove('hidden');
        settingsView.classList.add('hidden');
        loadData();
      }
    }

    async function loadData() {
      const loader = document.getElementById('data-loader');
      const grid = document.getElementById('data-grid');
      const empty = document.getElementById('data-empty');

      loader.classList.remove('hidden');
      grid.classList.add('hidden');
      empty.classList.add('hidden');
      grid.innerHTML = '';
      loadedItems = [];

      try {
        let query = supabaseClient.from(currentTab).select('*');
        if (currentTab === 'events') {
          query = query.order('sort_order', { ascending: true });
        } else {
          query = query.order('created_at', { ascending: false });
        }
        const { data, error } = await query;
        if (error) throw error;

        loader.classList.add('hidden');
        loadedItems = data || [];

        if (loadedItems.length === 0) {
          empty.classList.remove('hidden');
        } else {
          grid.classList.remove('hidden');
          loadedItems.forEach(item => {
            grid.appendChild(createCard(item));
          });
        }
      } catch (err) {
        loader.classList.add('hidden');
        empty.classList.remove('hidden');
        console.error(err);
        alert("Error loading data: " + err.message);
      }
    }

    let dragSrcEl = null;

    function handleDragStart(e) {
      dragSrcEl = this;
      e.dataTransfer.effectAllowed = 'move';
      this.classList.add('opacity-40', 'border-brand-pink/50');
    }

    function handleDragOver(e) {
      if (e.preventDefault) {
        e.preventDefault();
      }
      e.dataTransfer.dropEffect = 'move';
      return false;
    }

    function handleDragEnd(e) {
      this.classList.remove('opacity-40', 'border-brand-pink/50');
      const cols = document.querySelectorAll('#data-grid > div');
      cols.forEach(col => {
        col.classList.remove('border-brand-pink/50');
      });
    }

    async function handleDrop(e) {
      e.stopPropagation();
      if (dragSrcEl !== this) {
        const parent = this.parentNode;
        const children = Array.from(parent.children);
        const fromIndex = children.indexOf(dragSrcEl);
        const toIndex = children.indexOf(this);
        
        if (fromIndex < toIndex) {
          parent.insertBefore(dragSrcEl, this.nextSibling);
        } else {
          parent.insertBefore(dragSrcEl, this);
        }

        await saveNewCardOrder();
      }
      return false;
    }

    async function saveNewCardOrder() {
      const parent = document.getElementById('data-grid');
      const children = Array.from(parent.children);
      
      const promises = children.map((col, idx) => {
        const id = parseInt(col.dataset.id);
        const sort_order = idx + 1;
        
        const item = loadedItems.find(x => x.id === id);
        if (item) item.sort_order = sort_order;
        
        return supabaseClient
          .from(currentTab)
          .update({ sort_order })
          .eq('id', id);
      });

      try {
        const results = await Promise.all(promises);
        for (const res of results) {
          if (res.error) throw res.error;
        }
      } catch (err) {
        alert('Failed to save new order: ' + err.message);
      }
    }

        col.addEventListener('dragend', handleDragEnd);
        col.addEventListener('drop', handleDrop);

      let img = item.hover_image || item.image_url || item.image_url_1 || item.logo_url;
      let desc = item.description || item.role || item.category || item.website_url || '';

    function toggleSocialInput(name) {
      const toggle = document.getElementById(`toggle-${name}`);
      const input = document.getElementById(`set-${name}`);
      if (toggle && input) {
        if (toggle.checked) {
          input.disabled = false;
          input.classList.remove('opacity-40');
        } else {
          input.disabled = true;
          input.classList.add('opacity-40');
        }
      }
    }

    // Load Settings Data
    async function loadSettingsData() {
      const loader = document.getElementById('data-loader');
      const settingsView = document.getElementById('settings-view');
      
      loader.classList.remove('hidden');
      settingsView.classList.add('opacity-40');

      try {
        // Fetch About
        const { data: aboutData, error: aboutErr } = await supabaseClient.from('about').select('*').eq('id', 1).single();
        if (aboutErr) console.error(aboutErr);
        else if (aboutData) {
          document.getElementById('set-about-main').value = aboutData.main_text;
          document.getElementById('set-about-sub').value = aboutData.sub_text;
          
          if (aboutData.bg_image_before) {
            const previewB = document.getElementById('about-img-before-preview');
            previewB.querySelector('img').src = aboutData.bg_image_before;
            previewB.classList.remove('hidden');
          }
          if (aboutData.bg_image_after) {
            const previewA = document.getElementById('about-img-after-preview');
            previewA.querySelector('img').src = aboutData.bg_image_after;
            previewA.classList.remove('hidden');
          }
        }

        // Fetch Footer Social Settings
        const { data: settingsData, error: settingsErr } = await supabaseClient.from('settings').select('*').eq('id', 1).single();
        if (settingsErr) console.error(settingsErr);
        else if (settingsData) {
          document.getElementById('set-email').value = settingsData.contact_email || '';

          const setupSocialField = (name, urlVal, defaultUrl) => {
            const toggle = document.getElementById(`toggle-${name}`);
            const input = document.getElementById(`set-${name}`);
            if (toggle && input) {
              const hasUrl = urlVal !== null && urlVal !== undefined && urlVal !== '';
              toggle.checked = hasUrl;
              input.value = hasUrl ? urlVal : defaultUrl;
              toggleSocialInput(name);
            }
          };

          setupSocialField('instagram', settingsData.instagram_url, 'https://www.instagram.com');
          setupSocialField('facebook', settingsData.facebook_url, 'https://www.facebook.com');
          setupSocialField('linkedin', settingsData.linkedin_url, 'https://www.linkedin.com');
          setupSocialField('youtube', settingsData.youtube_url, 'https://www.youtube.com');
          setupSocialField('twitter', settingsData.twitter_url, 'https://x.com');
        }

        loader.classList.add('hidden');
        settingsView.classList.remove('opacity-40');
      } catch (err) {
        loader.classList.add('hidden');
        settingsView.classList.remove('opacity-40');
        console.error(err);
      }
    }

                  <div id="ach-img2-preview" class="absolute inset-0 rounded-xl overflow-hidden bg-brand-card hidden">
                    <img src="${editData ? editData.image_url_2 : ''}" class="w-full h-full object-cover">
                  </div>
                  <input type="file" id="ach-img2" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                </div>
              </div>

              <!-- Slot 3 -->
              <div>
                <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Right Slot 3 (Large)</label>
                <div id="ach-img3-zone" class="border border-white/10 hover:border-brand-pink/50 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer transition-colors relative min-h-[90px]">
                  <i class="ri-add-line text-lg text-gray-500"></i>
                  <div id="ach-img3-preview" class="absolute inset-0 rounded-xl overflow-hidden bg-brand-card hidden">
                    <img src="${editData ? editData.image_url_3 : ''}" class="w-full h-full object-cover">
                  </div>
                  <input type="file" id="ach-img3" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                </div>
                </div>
              </div>
            </div>
          </div>
        `;
        
        // NOTE: setupAchievementUploads moved below after innerHTML += (which destroys DOM nodes/listeners)
      } else if (currentTab === 'clubs') {
        formFields.innerHTML = `
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Club Name</label>
            <input type="text" id="club-name" required class="w-full px-4 py-3 bg-brand-dark/80 border border-white/10 rounded-xl focus:outline-none focus:border-brand-pink text-white" value="${editData ? editData.name : ''}">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Club Web URL (Optional)</label>
            <input type="text" id="club-url" class="w-full px-4 py-3 bg-brand-dark/80 border border-white/10 rounded-xl focus:outline-none focus:border-brand-pink text-white" placeholder="e.g. https://example.com" value="${editData ? (editData.website_url || '') : ''}">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Club Logo (SVG Preferred)</label>
            <div id="drop-zone" class="border-2 border-dashed border-white/10 hover:border-brand-pink/50 rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer transition-colors relative min-h-[140px]">
              <i class="ri-drag-drop-line text-3xl text-gray-500 mb-2"></i>
              <span class="text-xs text-gray-400">Drag & drop SVG file here or <span class="text-brand-pink">browse</span></span>
              <input type="file" id="image-upload" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
              <div id="upload-preview" class="absolute inset-0 rounded-2xl overflow-hidden bg-brand-card hidden pointer-events-none">
                <img src="${editData ? editData.logo_url : ''}" class="w-full h-full object-contain p-4 mix-blend-multiply">
                <div class="absolute inset-0 bg-black/50 flex items-center justify-center text-xs font-bold">Change Logo</div>
              </div>
            </div>
          </div>
        `;
      }

      // Append visibility toggler automatically
      formFields.innerHTML += `
        <div class="flex items-center gap-4 mt-6 bg-brand-dark/40 border border-white/5 rounded-2xl p-4">
          <input type="checkbox" id="entry-visible" class="w-5 h-5 rounded border-white/10 bg-brand-dark/80 accent-brand-pink focus:outline-none cursor-pointer" ${editData === null || editData.is_visible ? 'checked' : ''}>
          <label for="entry-visible" class="flex flex-col cursor-pointer select-none">
            <span class="text-sm font-bold text-white">Visible on Website</span>
            <span class="text-xs text-gray-400">If unchecked, this item will be hidden from the public homepage.</span>
          </label>
        </div>
      `;

      // Default file upload behaviour (except for special multi/cropper elements)
      const fileInput = document.getElementById('image-upload');
      const preview = document.getElementById('upload-preview');
      const dropZone = document.getElementById('drop-zone');

      if (editData && preview) {
        preview.classList.remove('hidden');
      }

       if (fileInput) {
        fileInput.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) {
            if (currentTab === 'team') {
              openCropper(file, preview, 1, (base64) => { croppedFileBase64 = base64; });
            } else if (currentTab === 'gallery') {
              openCropper(file, preview, 4 / 3, (base64) => { croppedFileBase64 = base64; });
            } else if (currentTab === 'events') {
              openCropper(file, preview, 3 / 2, (base64) => { croppedFileBase64 = base64; });
            } else {
              const reader = new FileReader();
              reader.onload = () => {
                preview.querySelector('img').src = reader.result;
                preview.classList.remove('hidden');
              };
              reader.readAsDataURL(file);
            }
          }
        });
      }

      if (dropZone) {
        ['dragenter', 'dragover'].forEach(eventName => {
          dropZone.addEventListener(eventName, () => dropZone.classList.add('border-brand-pink/50'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
          dropZone.addEventListener(eventName, () => dropZone.classList.remove('border-brand-pink/50'), false);
        });
      }

      // Setup image listeners AFTER all innerHTML manipulation is complete
      if (currentTab === 'achievements') {
        setupAchievementUploads(editData);
      } else if (currentTab === 'events') {
        setupMultiImageUpload(editData);
      }
    }

    function closeFormModal() {
      const modal = document.getElementById('form-modal');
      gsap.to(modal.children[0], { scale: 0.9, opacity: 0, duration: 0.2, onComplete: () => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
      }});
    }

     // Cropper Utility functions
    function openCropper(file, formPreview, aspect = 1, callback = null) {
      currentCropPreview = formPreview;
      currentCropAspect = aspect;
      currentCropCallback = callback;

      const modal = document.getElementById('cropper-modal');
      const cropperImg = document.getElementById('cropper-image');
      const titleEl = document.getElementById('cropper-modal-title');
      
      if (titleEl) {
        if (aspect === 1 && currentTab === 'team') {
          titleEl.innerText = 'Crop Profile Image (1:1)';
        } else if (currentTab === 'events') {
          titleEl.innerText = 'Crop Event Hover Image (3:2)';
        } else if (currentTab === 'gallery') {
          titleEl.innerText = 'Crop Gallery Photo (4:3)';
        } else if (currentTab === 'achievements') {
          titleEl.innerText = 'Crop Achievement Photo';
        } else if (currentTab === 'settings') {
          titleEl.innerText = 'Crop About Section Image (4:5)';
        } else {
          titleEl.innerText = 'Crop Image';
        }
      }

      // Toggle circle mask: only for team (1:1)
      if (aspect === 1 && currentTab === 'team') {
        modal.classList.add('cropper-circle');
      } else {
        modal.classList.remove('cropper-circle');
      }

      const reader = new FileReader();
      reader.onload = () => {
        cropperImg.src = reader.result;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        if (cropper) cropper.destroy();
        cropper = new Cropper(cropperImg, {
          aspectRatio: currentCropAspect,
          viewMode: 1,
          dragMode: 'move',
          background: false
        });
      };
      reader.readAsDataURL(file);
    }

    function closeCropper() {
      const modal = document.getElementById('cropper-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      if (cropper) {
        cropper.destroy();
        cropper = null;
      }
    }

    function applyCrop() {
      if (cropper) {
        let cropWidth = 600;
        let cropHeight = Math.round(cropWidth / currentCropAspect);

        const canvas = cropper.getCroppedCanvas({
          width: cropWidth,
          height: cropHeight
        });
        const base64 = canvas.toDataURL('image/jpeg', 0.9);
        
        // Show crop on form preview
        if (currentCropPreview) {
          const img = currentCropPreview.querySelector('img');
          if (img) img.src = base64;
          currentCropPreview.classList.remove('hidden');
        }
        
        if (currentCropCallback) {
          currentCropCallback(base64);
        } else {
          croppedFileBase64 = base64; // Default fallback
        }
        closeCropper();
      }
    }

    // Dynamic Multi image setups
    function renderEventGalleryPreview() {
      const container = document.getElementById('events-gallery-preview');
      if (!container) return;
      container.innerHTML = '';
      
      currentEventImages.forEach((imgSrc, idx) => {
        const thumb = document.createElement('div');
        thumb.className = "relative aspect-square rounded-xl overflow-hidden bg-brand-dark/50 border border-white/10 group";
        thumb.innerHTML = `
          <img src="${imgSrc}" class="w-full h-full object-cover">
          <button type="button" onclick="removeEventGalleryImage(${idx})" class="absolute top-1 right-1 w-5 h-5 rounded-full bg-red-500/80 hover:bg-red-500 flex items-center justify-center text-white text-xs shadow-md transition-colors z-25">
            <i class="ri-close-line"></i>
          </button>
        `;
        container.appendChild(thumb);
      });
      
      const label = document.getElementById('gallery-count');
      if (label) {
        label.innerText = `${currentEventImages.length} images loaded`;
      }
    }

    window.removeEventGalleryImage = function(idx) {
      currentEventImages.splice(idx, 1);
      renderEventGalleryPreview();
    };

    function setupMultiImageUpload(editData) {
      if (editData && editData.images) {
        currentEventImages = [...editData.images];
      } else {
        currentEventImages = [];
      }
      renderEventGalleryPreview();

      const input = document.getElementById('image-upload-multiple');
      const label = document.getElementById('gallery-count');
      
      input.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        label.innerText = `Loading ${files.length} images...`;
        
        for (const file of files) {
          const reader = new FileReader();
          const base64Promise = new Promise(resolve => reader.onload = () => resolve(reader.result));
          reader.readAsDataURL(file);
          const base64 = await base64Promise;
          currentEventImages.push(base64);
        }
        renderEventGalleryPreview();
      });
    }

    function setupAchievementUploads(editData) {
      const slots = [
        { id: 'ach-img1', label: 'ach-img1-preview', aspect: 16/9, setVal: (val) => achievementImage1Base64 = val },
        { id: 'ach-img2', label: 'ach-img2-preview', aspect: 16/9, setVal: (val) => achievementImage2Base64 = val },
        { id: 'ach-img3', label: 'ach-img3-preview', aspect: 4/3, setVal: (val) => achievementImage3Base64 = val }
      ];

      slots.forEach(slot => {
        const input = document.getElementById(slot.id);
        const preview = document.getElementById(slot.label);
        
        if (editData && preview.querySelector('img').src) {
          preview.classList.remove('hidden');
        }

        input.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) {
            openCropper(file, preview, slot.aspect, (base64) => {
              slot.setVal(base64);
            });
          }
        });
      });
    }

    function setupSettingsPreviews() {
      const binds = [
        { inputId: 'about-img-before', previewId: 'about-img-before-preview', setVal: (val) => aboutImgBeforeBase64 = val },
        { inputId: 'about-img-after', previewId: 'about-img-after-preview', setVal: (val) => aboutImgAfterBase64 = val }
      ];

      binds.forEach(bind => {
        const input = document.getElementById(bind.inputId);
        const preview = document.getElementById(bind.previewId);
        
        input.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) {
            openCropper(file, preview, 4 / 5, (base64) => {
              bind.setVal(base64);
            });
          }
        });
      });
    }

    function editItem(item) {
      openFormModal(item);
    }

    async function deleteItem(id) {
      if (!confirm('Are you sure you want to delete this item? This action is permanent.')) return;

      try {
        const { error } = await supabaseClient.from(currentTab).delete().eq('id', id);
        if (error) throw error;
        loadData();
      } catch (err) {
        alert('Deletion failed: ' + err.message);
      }
    }

    async function uploadToCloudinary(filePayload, folderPath, publicId) {
      const formData = new FormData();
      formData.append('file', filePayload);
      formData.append('upload_preset', CLOUDINARY_PRESET);
      formData.append('folder', folderPath);
      if (publicId) {
        formData.append('public_id', publicId);
      }

      const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`Cloudinary upload failed: ${response.status} ${errText}`);
      }

      const data = await response.json();
      return data.secure_url;
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submit-btn');
      const entryId = document.getElementById('entry-id').value;
      const fileInput = document.getElementById('image-upload');

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> <span>Uploading...</span>`;

      try {
        let imageUrl = '';
        let folderPath = '';
        let publicId = '';

        // 1. Image Routing Configurations
        if (currentTab === 'events') {
          const year = document.getElementById('event-year').value.trim();
          const folder = document.getElementById('event-folder').value.trim();
          folderPath = `issacc homepage/Event/${year}/${folder}`;
          publicId = 'hover_image';
        } else if (currentTab === 'team') {
          const category = document.getElementById('team-category').value;
          const year = document.getElementById('team-year').value.trim();
          folderPath = `issacc homepage/Team/${year}/${category}`;
        } else if (currentTab === 'gallery') {
          folderPath = `issacc homepage/Gallery`;
        } else if (currentTab === 'achievements') {
          const folder = document.getElementById('ach-folder').value.trim();
          folderPath = `issacc homepage/Achhievement/${folder}`;
        } else if (currentTab === 'clubs') {
          folderPath = `issacc homepage/clubs/logos/white bg logo`;
        }

        // 2. Upload main image (use cropped file base64 if team profiles)
        if (currentTab === 'team' && croppedFileBase64) {
          imageUrl = await uploadToCloudinary(croppedFileBase64, folderPath, publicId);
        } else if (fileInput && fileInput.files.length > 0) {
          const reader = new FileReader();
          const base64Promise = new Promise(resolve => reader.onload = () => resolve(reader.result));
          reader.readAsDataURL(fileInput.files[0]);
          const base64 = await base64Promise;
          imageUrl = await uploadToCloudinary(base64, folderPath, publicId);
        }

        // 3. Prepare Payload
        let payload = {};
        const isVisible = document.getElementById('entry-visible').checked;

        if (currentTab === 'events') {
          // Upload new slider images and keep existing ones
          let imagesUrlsArray = [];
          for (let i = 0; i < currentEventImages.length; i++) {
            const item = currentEventImages[i];
            if (item.startsWith('data:')) {
              const url = await uploadToCloudinary(item, folderPath, `slide_${Date.now()}_${i}`);
              imagesUrlsArray.push(url);
            } else {
              imagesUrlsArray.push(item);
            }
          }

          payload = {
            title: document.getElementById('event-title').value,
            subtitle: document.getElementById('event-subtitle').value,
            date: document.getElementById('event-date').value,
            description: document.getElementById('event-desc').value,
            registration_link: document.getElementById('event-link').value || null,
            is_visible: isVisible
          };
          if (!entryId) {
            payload.sort_order = loadedItems.length + 1;
          }
          if (imageUrl) payload.hover_image = imageUrl;
          payload.images = imagesUrlsArray;
          
        } else if (currentTab === 'team') {
          payload = {
            name: document.getElementById('team-name').value,
            role: document.getElementById('team-role').value,
            category: document.getElementById('team-category').value,
            is_visible: isVisible
          };
          if (imageUrl) payload.image_url = imageUrl;
          
        } else if (currentTab === 'gallery') {
          payload = {
            title: document.getElementById('gallery-title').value,
            category: document.getElementById('gallery-category').value,
            is_visible: isVisible
          };
          if (imageUrl) payload.image_url = imageUrl;
          
        } else if (currentTab === 'achievements') {
          // Upload achievement slot photos
          let imgUrl1 = '', imgUrl2 = '', imgUrl3 = '';
          if (achievementImage1Base64) imgUrl1 = await uploadToCloudinary(achievementImage1Base64, folderPath, 'small_left_top');
          if (achievementImage2Base64) imgUrl2 = await uploadToCloudinary(achievementImage2Base64, folderPath, 'small_left_bottom');
          if (achievementImage3Base64) imgUrl3 = await uploadToCloudinary(achievementImage3Base64, folderPath, 'large_right');

          payload = {
            title: document.getElementById('ach-title').value,
            description: document.getElementById('ach-desc').value,
            link_url: document.getElementById('ach-link').value || null,
            link_text: document.getElementById('ach-link-text').value || 'Learn More',
            is_visible: isVisible
          };
          if (imgUrl1) payload.image_url_1 = imgUrl1;
          if (imgUrl2) payload.image_url_2 = imgUrl2;
          if (imgUrl3) payload.image_url_3 = imgUrl3;
          
        } else if (currentTab === 'clubs') {
          payload = {
            name: document.getElementById('club-name').value,
            website_url: document.getElementById('club-url').value || null,
            is_visible: isVisible
          };
          if (imageUrl) payload.logo_url = imageUrl;
        }

        let dbRes;
        if (entryId) {
          dbRes = await supabaseClient.from(currentTab).update(payload).eq('id', entryId);
        } else {
          dbRes = await supabaseClient.from(currentTab).insert([payload]);
        }

        if (dbRes.error) throw dbRes.error;

        closeFormModal();
        loadData();
      } catch (err) {
        alert('Saving failed: ' + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<span>Publish</span>`;
      }
    }

    // Handles single settings form save
    async function handleSettingsSubmit(e) {
      e.preventDefault();
      const saveBtn = document.getElementById('save-settings-btn');
      saveBtn.disabled = true;
      saveBtn.innerHTML = `<i class="ri-loader-line animate-spin"></i> Saving...`;

      try {
        const fileB = document.getElementById('about-img-before');
        const fileA = document.getElementById('about-img-after');
        let imgUrlB = '', imgUrlA = '';

        if (aboutImgBeforeBase64) {
          imgUrlB = await uploadToCloudinary(aboutImgBeforeBase64, 'issacc homepage/About');
        }
        if (aboutImgAfterBase64) {
          imgUrlA = await uploadToCloudinary(aboutImgAfterBase64, 'issacc homepage/About');
        }

        // 1. Save About Row
        let aboutPayload = {
          id: 1,
          main_text: document.getElementById('set-about-main').value,
          sub_text: document.getElementById('set-about-sub').value
        };
        if (imgUrlB) aboutPayload.bg_image_before = imgUrlB;
        if (imgUrlA) aboutPayload.bg_image_after = imgUrlA;

        const aboutRes = await supabaseClient.from('about').update(aboutPayload).eq('id', 1);
        if (aboutRes.error) throw aboutRes.error;

        aboutImgBeforeBase64 = null;
        aboutImgAfterBase64 = null;

        // Helper to get URL if toggle is checked, or null if disabled
        const getSocialUrl = (name) => {
          const toggle = document.getElementById(`toggle-${name}`);
          const input = document.getElementById(`set-${name}`);
          if (toggle && toggle.checked && input) {
            return input.value.trim() || null;
          }
          return null;
        };

        // 2. Save Footer Settings Row (only valid columns in database schema)
        let settingsPayload = {
          contact_email: document.getElementById('set-email').value || null,
          instagram_url: getSocialUrl('instagram'),
          facebook_url: getSocialUrl('facebook'),
          linkedin_url: getSocialUrl('linkedin'),
          youtube_url: getSocialUrl('youtube'),
          twitter_url: getSocialUrl('twitter')
        };

        const settingsRes = await supabaseClient.from('settings').update(settingsPayload).eq('id', 1);
        if (settingsRes.error) throw settingsRes.error;

        alert('Settings saved successfully!');
        loadSettingsData();
      } catch (err) {
        alert('Saving settings failed: ' + err.message);
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = `<i class="ri-save-line"></i> Save All Settings`;
      }
    }
  </script>
